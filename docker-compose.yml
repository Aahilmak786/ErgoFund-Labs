# Bene Fundraising – containerized run (port 3000)
version: '3.8'

services:
  bene-fundraising:
    build: .
    container_name: bene-fundraising
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PUBLIC_ERGO_EXPLORER_URL=https://api.ergoplatform.com
      # Set to https://api-testnet.ergoplatform.com for Ergo Testnet
    restart: unless-stopped
