# CI: lint, format check, test, build on push/PR
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run SvelteKit sync
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          PUBLIC_ERGO_EXPLORER_URL: https://api.ergoplatform.com
